server.port=9090
spring.application.name=api-gateway

jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# Auth service handles its own security
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://AUTH-SERVICE
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# CATALOG SERVICE - PUBLIC (Browsing allowed for Guests)
spring.cloud.gateway.routes[1].id=catalog-service-public
spring.cloud.gateway.routes[1].uri=lb://CATALOG-SERVICE
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**, /api/options/**
spring.cloud.gateway.routes[1].predicates[1]=Method=GET

# CATALOG SERVICE - PROTECTED (Sellers making changes)
spring.cloud.gateway.routes[2].id=catalog-service-protected
spring.cloud.gateway.routes[2].uri=lb://CATALOG-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**, /api/options/**
spring.cloud.gateway.routes[2].predicates[1]=Method=POST, PUT, DELETE
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# INVENTORY SERVICE
spring.cloud.gateway.routes[3].id=inventory-service
spring.cloud.gateway.routes[3].uri=lb://INVENTORY-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/inventory/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

# ORDER SERVICE
spring.cloud.gateway.routes[4].id=order-service
spring.cloud.gateway.routes[4].uri=lb://ORDER-SERVICE
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

# LOGISTICS SERVICE
spring.cloud.gateway.routes[5].id=logistics-service
spring.cloud.gateway.routes[5].uri=lb://LOGISTICS-SERVICE
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/shipments/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter

# ANALYTICS SERVICE
spring.cloud.gateway.routes[6].id=analytics-service
spring.cloud.gateway.routes[6].uri=lb://ANALYTICS-SERVICE
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/analytics/**
spring.cloud.gateway.routes[6].filters[0]=AuthenticationFilter

# Global Gateway CORS properties
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedMethods=*
spring.cloud.gateway.globalcors.corsConfigurations.[/**].allowedHeaders=*