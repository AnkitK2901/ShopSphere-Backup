server.port=9090
spring.application.name=api-gateway
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Route 1: Inventory Service (Secured)
spring.cloud.gateway.routes[0].id=inventory-service
spring.cloud.gateway.routes[0].uri=lb://inventory-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/inventory/**
spring.cloud.gateway.routes[0].filters[0]=AuthenticationFilter

# Route 2: Order Service (Secured)
spring.cloud.gateway.routes[1].id=order-service
spring.cloud.gateway.routes[1].uri=lb://order-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/orders/**
spring.cloud.gateway.routes[1].filters[0]=AuthenticationFilter

# Route 3a: Catalog Service PUBLIC (Only GET requests - Browsing is free!)
spring.cloud.gateway.routes[2].id=catalog-service-public
spring.cloud.gateway.routes[2].uri=lb://catalog-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/products/**
spring.cloud.gateway.routes[2].predicates[1]=Method=GET

# Route 3b: Catalog Service SECURED (POST, PUT, DELETE - Admins only)
spring.cloud.gateway.routes[3].id=catalog-service-secured
spring.cloud.gateway.routes[3].uri=lb://catalog-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/products/**, /api/options/**
spring.cloud.gateway.routes[3].predicates[1]=Method=POST,PUT,DELETE,PATCH
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

# Route 4: Auth Service (Public Front Desk)
spring.cloud.gateway.routes[4].id=auth-service
spring.cloud.gateway.routes[4].uri=lb://auth-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/auth/**

# Route 5: Logistics Service (Secured) - FIX FOR MISSING ROUTE
spring.cloud.gateway.routes[5].id=logistics-service
spring.cloud.gateway.routes[5].uri=lb://logistics-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/shipments/**
spring.cloud.gateway.routes[5].filters[0]=AuthenticationFilter

# Route 6: Analytics Service (Secured) - FIX FOR MISSING ROUTE
spring.cloud.gateway.routes[6].id=analytics-service
spring.cloud.gateway.routes[6].uri=lb://analytics-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/analytics/**
spring.cloud.gateway.routes[6].filters[0]=AuthenticationFilter

# ==========================================
# 🌐 CORS CONFIGURATION
# ==========================================
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=http://localhost:4200
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*