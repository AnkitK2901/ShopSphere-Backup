<div class="dashboard-container" *ngIf="!isLoading && shipment">
  <div class="form-card">
    <div class="form-header" style="background: #2b6cb0;">
      <h2>Packing Slip: Order #{{ shipment.orderId }}</h2>
      <p>Verify all items before sealing the package.</p>
    </div>
    <div class="modern-form">
      <div class="info-banner" style="background: #ebf8ff; padding: 20px; border-radius: 8px;">
        <h3 style="margin-top: 0; color: #2b6cb0;">Shipping To:</h3>
        <p><strong>Customer ID:</strong> {{ shipment.customerId || 'Loading...' }}</p>
        <p><strong>Current Status:</strong> {{ shipment.status }}</p>
      </div>

      <div class="form-actions" style="margin-top: 30px;">
        <button class="btn-secondary" routerLink="/logistics/queue">Back to Queue</button>
        <button class="btn-primary" (click)="markAsPacked()" style="background: #2b6cb0;">Verify & Mark Packed</button>
      </div>
    </div>
  </div>
</div>
