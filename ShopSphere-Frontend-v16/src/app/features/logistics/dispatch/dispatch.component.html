<div class="dashboard-container" *ngIf="!isLoading && shipment">
  <div class="form-card">
    <div class="form-header" style="background: #2f855a;">
      <h2>Dispatch: Order #{{ shipment.orderId }}</h2>
      <p>Assign carrier and generate tracking.</p>
    </div>
    <div class="modern-form">
      <div class="form-row">
        <div class="form-group full-width">
          <label>Select Carrier</label>
          <select [(ngModel)]="selectedCarrier" style="padding: 12px; border-radius: 8px; border: 1px solid #cbd5e0;">
            <option value="Delhivery">Delhivery Express</option>
            <option value="Shiprocket">Shiprocket Prime</option>
            <option value="FedEx">FedEx International</option>
          </select>
        </div>
      </div>

      <div class="form-actions" style="margin-top: 30px;">
        <button class="btn-secondary" routerLink="/logistics/queue">Cancel</button>
        <button class="btn-primary" (click)="dispatchShipment()" style="background: #2f855a;">Handover to Carrier</button>
      </div>
    </div>
  </div>
</div>
