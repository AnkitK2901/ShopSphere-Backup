<div class="dashboard-container">
  <div class="dashboard-header" style="display: flex; justify-content: space-between; align-items: center;">
    <div>
      <h1>Artisan Dashboard</h1>
      <p>Manage your ecosystem, products, and inventory.</p>
    </div>
    <button class="btn-primary" routerLink="/artisan/product/new" style="padding: 10px 20px; border-radius: 8px; font-weight: bold; background-color: #4a5568; color: white; border: none; cursor: pointer;">
      + Add New Product
    </button>
  </div>

  <div *ngIf="errorMessage" class="error-banner" style="background-color: #fee2e2; color: #991b1b; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
    {{ errorMessage }}
  </div>

  <div class="stats-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
    
    <div class="stat-card" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
      <h3>Total Unique Products</h3>
      <p style="font-size: 2rem; font-weight: bold; color: #2b6cb0;">{{ totalProducts }}</p>
    </div>
    
    <div class="stat-card" style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
      <h3>Total Items in Stock</h3>
      <p style="font-size: 2rem; font-weight: bold; color: #38a169;">{{ totalItemsInStock }}</p>
    </div>

  </div>

  <div class="action-grid" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
    <div class="action-card" routerLink="/artisan/inventory" style="background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; cursor: pointer; transition: transform 0.2s;">
      <h3>Manage Inventory Levels</h3>
      <p>View stock details, update quantities, and check thresholds.</p>
    </div>
  </div>
</div>
