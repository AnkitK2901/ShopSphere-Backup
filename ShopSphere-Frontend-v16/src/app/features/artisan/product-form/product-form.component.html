<div class="glass-panel" style="max-width: 800px; margin: 0 auto;">
  <h2 style="margin-top: 0; margin-bottom: 24px;">➕ Add New Product</h2>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="form-grid">
    
    <div class="form-group full-width">
      <label>Product Name</label>
      <input type="text" formControlName="name" placeholder="Enter product name">
    </div>

    <div class="form-group full-width">
      <label>Description</label>
      <textarea formControlName="description" rows="3" placeholder="Enter product description"></textarea>
    </div>

    <div class="form-group">
      <label>Price ($)</label>
      <input type="number" formControlName="price" placeholder="0.00">
    </div>

    <div class="form-group">
      <label>Supplier ID</label>
      <input type="text" formControlName="supplierId" placeholder="e.g., SUP-001">
    </div>

    <div class="form-group">
      <label>Initial Stock Level</label>
      <input type="number" formControlName="stockLevel" placeholder="0">
    </div>

    <div class="form-group">
      <label>Reorder Threshold</label>
      <input type="number" formControlName="reorderThreshold" placeholder="10">
    </div>

    <div class="form-group">
      <label>Supplier Lead Time (Days)</label>
      <input type="number" formControlName="supplierLeadTimeDays" placeholder="7">
    </div>

    <div class="form-actions full-width">
      <button type="button" class="btn cancel-btn" routerLink="/artisan/inventory">Cancel</button>
      <button type="submit" class="btn" [disabled]="productForm.invalid || isSubmitting">
        {{ isSubmitting ? 'Saving...' : 'Save Product' }}
      </button>
    </div>

  </form>
</div>
