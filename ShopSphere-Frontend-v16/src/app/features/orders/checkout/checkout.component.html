<div class="checkout-wrapper">
  <div class="checkout-header">
    <h2>Secure Checkout</h2>
    <a routerLink="/cart" class="back-link">Return to Cart</a>
  </div>

  <div class="checkout-layout">

    <div class="form-column">
      <form [formGroup]="checkoutForm" (ngSubmit)="placeOrder()">
        <div class="form-section">
          <h3>1. Shipping Details</h3>
          <div class="input-group"><label>Full Name</label><input type="text" formControlName="fullName"
              placeholder="John Doe"></div>
          <div class="input-group"><label>Street Address</label><input type="text" formControlName="shippingAddress"
              placeholder="123 Artisan Lane"></div>
          <div class="form-row">
            <div class="input-group half"><label>City</label><input type="text" formControlName="city"
                placeholder="New York"></div>
            <div class="input-group half"><label>Zip/Postal Code</label><input type="text" formControlName="zipCode"
                placeholder="10001"></div>
          </div>
        </div>

        <div class="form-section">
          <h3>2. Payment Method</h3>

          <div class="input-group">
            <label>Card Number (16 Digits)</label>
            <input type="text" formControlName="cardNumber" placeholder="0000 0000 0000 0000" maxlength="16">
          </div>

          <div class="form-row">
            <div class="input-group half">
              <label>Expiry Date</label>
              <input type="text" formControlName="expiry" placeholder="MM/YY">
            </div>
            <div class="input-group half">
              <label>CVV</label>
              <input type="password" formControlName="cvv" placeholder="123" maxlength="3">
            </div>
          </div>
        </div>

        <div class="summary-column">
          <div class="summary-box">
            <h3>Order Summary</h3>

            <div class="summary-items">
              <div class="item-row" *ngFor="let item of cartItems">
                <div class="item-details">
                  <strong>{{ item.quantity }}x {{ item.name }}</strong>
                  <span class="item-variant">{{ item.selectedOption?.value || 'Standard' }}</span>
                </div>
                <div class="item-price">₹{{ (item.basePrice * item.quantity) | number:'1.2-2' }}</div>
              </div>
            </div>

            <div class="summary-divider"></div>

            <div class="summary-total">
              <span>Total</span>
              <span class="total-amount">₹{{ cartTotal | number:'1.2-2' }}</span>
            </div>
          </div>
        </div>
