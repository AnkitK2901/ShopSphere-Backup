<nav class="navbar">
  <div class="nav-brand">
    <a routerLink="/" (click)="closeDropdown()">ShopSphere</a>
  </div>
  
  <div class="nav-links">
    
    <div class="cart-wrapper">
      <a routerLink="/cart" class="icon-btn cart-icon" (click)="closeDropdown()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
        <span class="badge" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
      </a>
    </div>

    <div class="profile-menu" #profileMenuRef>
      <button class="icon-btn" (click)="toggleDropdown($event)">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      </button>

      <div class="dropdown-menu" *ngIf="isDropdownOpen">
        <ng-container *ngIf="!(isLoggedIn$ | async)">
          <a routerLink="/login" (click)="closeDropdown()">Sign In</a>
          <a routerLink="/register" (click)="closeDropdown()">Create Account</a>
        </ng-container>

        <ng-container *ngIf="isLoggedIn$ | async">
          <a *ngIf="userRole === 'ROLE_CUSTOMER' || userRole === 'ROLE_ARTISAN'" routerLink="/orders/history" (click)="closeDropdown()">My Orders</a>
          <a *ngIf="userRole === 'ROLE_ARTISAN'" routerLink="/artisan/dashboard" (click)="closeDropdown()">Artisan Dashboard</a>
          <a *ngIf="userRole === 'ROLE_LOGISTICS'" routerLink="/logistics/queue" (click)="closeDropdown()">Logistics Dashboard</a>
          <a *ngIf="userRole === 'ROLE_ADMIN'" routerLink="/analytics/dashboard" (click)="closeDropdown()">Analytics Dashboard</a>
          <hr>
          <a (click)="logout()" class="logout-link" style="cursor: pointer; color: #e53e3e;">Sign Out</a>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
