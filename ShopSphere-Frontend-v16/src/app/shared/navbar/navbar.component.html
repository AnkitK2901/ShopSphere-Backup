<nav class="basic-nav">
  <div class="logo">
    <a routerLink="/" (click)="closeDropdown()">ShopSphere</a>
  </div>
  
  <div class="nav-actions">
    
    <a routerLink="/cart" class="icon-btn cart-icon" (click)="closeDropdown()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
      </svg>
      <span class="cart-badge" *ngIf="cartItemCount > 0">{{ cartItemCount }}</span>
    </a>

    <div class="dropdown-container">
      <button class="icon-btn" (click)="toggleDropdown()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </button>

      <div class="dropdown-menu" *ngIf="isDropdownOpen">
        
        <ng-container *ngIf="!(isLoggedIn$ | async)">
          <div class="dropdown-header">Welcome</div>
          <a routerLink="/login" (click)="closeDropdown()">Sign In</a>
          <a routerLink="/register" (click)="closeDropdown()">Create Account</a>
        </ng-container>

        <ng-container *ngIf="isLoggedIn$ | async">
          <div class="dropdown-header">My Account</div>
          
          <a *ngIf="userRole === 'ROLE_CUSTOMER' || userRole === 'ROLE_ARTISAN'" routerLink="/orders/history" (click)="closeDropdown()">My Orders</a>
          
          <a *ngIf="userRole === 'ROLE_ARTISAN'" routerLink="/artisan/dashboard" (click)="closeDropdown()">Artisan Dashboard</a>
          <a *ngIf="userRole === 'ROLE_LOGISTICS'" routerLink="/logistics/queue" (click)="closeDropdown()">Logistics Dashboard</a>
          
          <div class="divider"></div>
          <button class="logout-link" (click)="logout()">Logout</button>
        </ng-container>

      </div>
    </div>

  </div>
</nav>
