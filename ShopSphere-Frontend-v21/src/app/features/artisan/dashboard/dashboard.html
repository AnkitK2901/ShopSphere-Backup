<div class="dashboard-container">
  <h1>Artisan Workspace Dashboard</h1>
  <p>Welcome back! Here is an overview of your store.</p>

  <div class="stats-grid">
    <div class="stat-card">
      <h3>Total Unique Products</h3>
      <p class="big-number">{{ totalProducts }}</p> 
    </div>
    <div class="stat-card">
      <h3>Total Items In Stock</h3>
      <p class="big-number">{{ totalItemsInStock }}</p> 
    </div>
  </div>

  <div class="quick-actions">
    <a routerLink="/artisan/inventory" class="btn primary">View Inventory</a>
    <a routerLink="/artisan/products/new" class="btn secondary">Add New Inventory</a>
  </div>
</div>
